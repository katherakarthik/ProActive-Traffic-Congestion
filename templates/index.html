<!DOCTYPE html>
<html>
<head>
    <title>Traffic Prediction System</title>
<h3>📊 System Insight</h3>
<p>Signal timing increases with traffic density to reduce congestion.</p>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            margin-top: 50px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h1>🚦 Smart Traffic Prediction System</h1>

<div class="container">

<form action="/predict" method="post">

<input type="number" name="hour" placeholder="Hour (0-23)" required autofocus><br>

<input type="number" name="day" placeholder="Day (1-7)" required><br>

<input type="number" name="car" placeholder="Car Count" required><br>

<input type="number" name="bike" placeholder="Bike Count" required><br>

<input type="number" name="bus" placeholder="Bus Count" required><br>

<input type="number" name="truck" placeholder="Truck Count" required><br>


<button type="submit">Predict Traffic</button>

</form>

<div class="result">
    {{ prediction_text }}
</div>
<div class="result">
    <p><b>Traffic Level:</b> {{ traffic }}</p>
    <p><b>Recommended Signal:</b> {{ signal }} sec</p>
</div>

</div>

</body>
</html>
